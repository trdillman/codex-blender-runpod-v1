name: build-sandbox-image

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'sandbox-image/**'
      - 'broker/**'
      - 'sandbox-runtime/**'
      - '.github/workflows/build-sandbox-image.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: sandbox-image/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/codex-blender-runpod:main
